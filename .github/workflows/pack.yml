name: "Build package"

on: push

jobs:
    pack:
        name: Build package
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: "24.x"

            - name: Install dependencies
              run: npm ci

            - name: Build package
              run: |
                  npm pack

            - uses: actions/upload-artifact@v6
              with:
                  path: "*.tgz"
